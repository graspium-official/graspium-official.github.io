- id: "2025-001"
  title: "π₀: A Vision-Language-Action Flow Model for General Robot Control"
  authors: "K. Black, N. Brown, D. Driess et al."
  venue: "CoRL 2024"
  date: "2025-03-15"
  field: "vla"
  lang: "eng"
  keywords:
    - "VLA"
    - "Foundation Model"
    - "Flow Matching"
  presenter: "Chanyoung Ahn"
  status: "reviewed"
  tldr: "Proposes a unified vision-language-action model that uses flow matching to generate continuous robot actions, enabling general-purpose robot control across diverse manipulation tasks with a single pretrained model."
  notes: "Key insight: flow matching outperforms diffusion for action generation due to straighter trajectories. The VLA architecture unifies vision, language, and action in a single transformer. Discussion focused on scalability to new tasks and real-world deployment challenges."
