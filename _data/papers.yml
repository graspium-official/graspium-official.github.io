- id: "2025-008"
  title: "IndustReal: Sim-to-Real Policy Transfer for Contact-Rich Manipulation"
  authors: "B. Tang, M. Lin, I. Akinola et al."
  venue: "NeurIPS 2024"
  date: "2025-01-06"
  field: "sim2real"
  lang: "kor"
  keywords:
    - "Sim-to-Real"
    - "Contact-rich"
    - "Assembly"
  presenter: "Chanyoung Ahn"
  status: "reviewed"
  tldr: "Achieves sim-to-real transfer for industrial assembly tasks by combining GPU-accelerated simulation with novel algorithms for contact-rich manipulation, closing the reality gap for precise insertion and gear meshing."
  notes: "The SDF-based contact model is key for sim-to-real success. Demonstrated on real NIST assembly tasks. Group discussed applicability to our lab's peg-in-hole experiments and potential integration with tactile feedback."
