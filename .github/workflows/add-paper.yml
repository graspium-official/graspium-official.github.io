name: Add Paper from Issue

on:
  issues:
    types: [labeled]

jobs:
  add-paper:
    if: github.event.label.name == 'add-paper'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse issue and append paper entry
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body;

            // Parse form fields from issue body
            function parseField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\s*\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              if (!match) return '';
              return match[1].trim();
            }

            const title = parseField('Paper Title');
            const arxivId = parseField('arXiv ID');
            const authors = parseField('Authors');
            const venue = parseField('Venue');
            const field = parseField('Field');
            const lang = parseField('Language');
            const keywords = parseField('Keywords');
            const presenter = parseField('Presenter');
            const tldr = parseField('TL;DR');
            const paperUrl = parseField('Paper URL');
            const thumbnailRaw = parseField('Thumbnail Image');
            const slidesUrl = parseField('Slides URL');
            const videoUrl = parseField('Video URL');

            if (!title || !authors || !venue || !field || !lang || !keywords || !presenter) {
              core.setFailed('Missing required fields in the issue body.');
              return;
            }

            // Generate new paper ID (YYYY-NNN)
            const papersPath = '_data/papers.yml';
            const existing = fs.readFileSync(papersPath, 'utf8');
            const now = new Date();
            const year = now.getFullYear().toString();

            const idPattern = new RegExp(`id:\\s*"${year}-(\\d{3})"`, 'g');
            let maxNum = 0;
            let m;
            while ((m = idPattern.exec(existing)) !== null) {
              const num = parseInt(m[1], 10);
              if (num > maxNum) maxNum = num;
            }
            const newId = `${year}-${String(maxNum + 1).padStart(3, '0')}`;

            // Format date as YYYY-MM-DD
            const date = now.toISOString().split('T')[0];

            // Build keywords YAML list
            const kwList = keywords.split(',').map(k => k.trim()).filter(Boolean);
            const kwYaml = kwList.map(k => `    - "${k}"`).join('\n');

            // Escape double quotes in strings
            function esc(s) { return s.replace(/"/g, '\\"'); }

            // Build YAML entry
            let entry = `\n- id: "${newId}"`;
            entry += `\n  title: "${esc(title)}"`;
            entry += `\n  authors: "${esc(authors)}"`;
            entry += `\n  venue: "${esc(venue)}"`;
            entry += `\n  date: "${date}"`;
            entry += `\n  field: "${field}"`;
            entry += `\n  lang: "${lang}"`;
            entry += `\n  keywords:`;
            entry += `\n${kwYaml}`;
            entry += `\n  presenter: "${esc(presenter)}"`;
            entry += `\n  status: "pending"`;

            if (tldr && tldr !== '_No response_') {
              entry += `\n  tldr: "${esc(tldr)}"`;
            }

            if (paperUrl && paperUrl !== '_No response_') {
              entry += `\n  paper: "${esc(paperUrl)}"`;
            } else if (arxivId && arxivId !== '_No response_') {
              entry += `\n  paper: "https://arxiv.org/abs/${esc(arxivId)}"`;
            } else {
              entry += `\n  paper: "#"`;
            }

            // Handle thumbnail: extract image URL from markdown or plain URL
            let thumbnailPath = '';
            let thumbnailFallbackUrl = '';
            if (thumbnailRaw && thumbnailRaw !== '_No response_') {
              // Try to extract image URL from markdown syntax ![alt](url) or plain URL
              const mdImgMatch = thumbnailRaw.match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
              const plainUrlMatch = thumbnailRaw.match(/(https?:\/\/[^\s]+\.(png|jpg|jpeg|gif|webp|svg)(\?[^\s]*)?)/i);
              const anyUrlMatch = thumbnailRaw.match(/(https?:\/\/[^\s)]+)/);
              const imageUrl = mdImgMatch ? mdImgMatch[1] : (plainUrlMatch ? plainUrlMatch[1] : (anyUrlMatch ? anyUrlMatch[1] : ''));

              if (imageUrl) {
                // Determine file extension from URL
                const extMatch = imageUrl.match(/\.(png|jpg|jpeg|gif|webp|svg)/i);
                const ext = extMatch ? extMatch[1].toLowerCase() : 'png';
                const filename = `${newId}.${ext}`;
                thumbnailPath = `assets/thumbnails/${filename}`;

                // Download the image with proper headers
                const https = require('https');
                const http = require('http');

                try {
                  await new Promise((resolve, reject) => {
                    const fetchUrl = (url, redirectCount = 0) => {
                      if (redirectCount > 10) return reject(new Error('Too many redirects'));
                      const parsedUrl = new URL(url);
                      const client = parsedUrl.protocol === 'https:' ? https : http;
                      const options = {
                        hostname: parsedUrl.hostname,
                        path: parsedUrl.pathname + parsedUrl.search,
                        headers: {
                          'User-Agent': 'GitHub-Actions-Bot',
                          'Accept': 'image/*,*/*'
                        }
                      };
                      client.get(options, (res) => {
                        if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                          fetchUrl(res.headers.location, redirectCount + 1);
                          return;
                        }
                        if (res.statusCode !== 200) {
                          reject(new Error(`Failed to download image: HTTP ${res.statusCode}`));
                          return;
                        }
                        const chunks = [];
                        res.on('data', (chunk) => chunks.push(chunk));
                        res.on('end', () => {
                          const buffer = Buffer.concat(chunks);
                          fs.writeFileSync(thumbnailPath, buffer);
                          resolve();
                        });
                        res.on('error', reject);
                      }).on('error', reject);
                    };
                    fetchUrl(imageUrl);
                  });
                  core.info(`Thumbnail saved to ${thumbnailPath}`);
                } catch (err) {
                  core.warning(`Failed to download thumbnail: ${err.message}. Falling back to image URL.`);
                  thumbnailPath = '';
                  thumbnailFallbackUrl = imageUrl;
                }
              }
            }

            if (thumbnailPath) {
              entry += `\n  thumbnail: "${thumbnailPath}"`;
            } else if (thumbnailFallbackUrl) {
              entry += `\n  image_url: "${esc(thumbnailFallbackUrl)}"`;
            }

            if (slidesUrl && slidesUrl !== '_No response_') {
              entry += `\n  slides: "${esc(slidesUrl)}"`;
            }

            if (videoUrl && videoUrl !== '_No response_') {
              entry += `\n  video: "${esc(videoUrl)}"`;
            }

            entry += '\n';

            // Append to papers.yml
            fs.appendFileSync(papersPath, entry);

            // Export for later steps
            core.exportVariable('NEW_PAPER_ID', newId);
            core.exportVariable('PAPER_TITLE', title);

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/papers.yml
          git add assets/thumbnails/ 2>/dev/null || true
          git commit -m "Add paper ${NEW_PAPER_ID}: ${PAPER_TITLE}"
          git push

      - name: Close issue with comment
        uses: actions/github-script@v7
        with:
          script: |
            const newPaperId = process.env.NEW_PAPER_ID;
            const paperTitle = process.env.PAPER_TITLE;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Paper **${paperTitle}** has been registered with ID \`${newPaperId}\` and added to the reading list. Closing this issue.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
