name: "Add Paper"
description: "Submit a new paper for review"
labels: ["add-paper"]
body:
  - type: input
    id: paper_id
    attributes:
      label: Paper ID
      description: "Custom paper ID (e.g., initials-number)"
      placeholder: "e.g., cy-001"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Paper Title
      description: "Full title of the paper"
      placeholder: "e.g., π₀: A Vision-Language-Action Flow Model for General Robot Control"
    validations:
      required: true

  - type: input
    id: arxiv_id
    attributes:
      label: arXiv ID
      description: "arXiv identifier (optional)"
      placeholder: "e.g., 2410.24164"
    validations:
      required: false

  - type: input
    id: authors
    attributes:
      label: Authors
      description: "Author list (use et al. for long lists)"
      placeholder: "e.g., K. Black, N. Brown, D. Driess et al."
    validations:
      required: true

  - type: dropdown
    id: venue
    attributes:
      label: Venue
      description: "Publication venue"
      options:
        - CoRL
        - RSS
        - ICRA
        - IROS
        - NeurIPS
        - ICML
        - ICLR
        - CVPR
        - Science Robotics
        - T-RO
        - RA-L
        - arXiv
        - Ongoing
        - Done
    validations:
      required: true

  - type: dropdown
    id: field
    attributes:
      label: Field
      description: "Primary research field"
      options:
        - grasping
        - manipulation
        - imitation_learning
        - reinforcement_learning
        - vla
        - tactile
        - dexterous
        - sim2real
    validations:
      required: true

  - type: dropdown
    id: lang
    attributes:
      label: Language
      description: "Presentation language: depends on your materials! (pdf..)"
      options:
        - kor
        - eng
    validations:
      required: true

  - type: input
    id: keywords
    attributes:
      label: Keywords
      description: "Comma-separated keywords"
      placeholder: "e.g., VLA, Foundation Model, Flow Matching"
    validations:
      required: true

  - type: input
    id: presenter
    attributes:
      label: Presenter
      description: "Name of the presenter"
      placeholder: "e.g., Chanyoung Ahn"
    validations:
      required: true

  - type: textarea
    id: tldr
    attributes:
      label: TL;DR
      description: "2-3 sentence summary of the paper"
      placeholder: "Brief summary of the paper's main contribution and approach..."
    validations:
      required: false

  - type: input
    id: paper_url
    attributes:
      label: Paper URL
      description: "Direct link to the paper (optional)"
      placeholder: "https://..."
    validations:
      required: false

  - type: textarea
    id: thumbnail
    attributes:
      label: Thumbnail Image
      description: "Drag & drop an image here for the paper card thumbnail (optional). You can also paste an image URL."
      placeholder: "Drag and drop an image here, or paste an image URL..."
    validations:
      required: true

  - type: input
    id: slides
    attributes:
      label: Slides URL
      description: "Link to presentation slides (optional)"
      placeholder: "e.g., https://drive.google.com/file/d/1XqAataCxMdRTAElNjll_1FKzdYP9TnK0/view?usp=sharing"
    validations:
      required: false

  - type: input
    id: video
    attributes:
      label: Video URL
      description: "Link to presentation video (optional)"
      placeholder: "e.g., https://www.youtube.com/watch?v=DAYDULXfEDc"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: "Review notes or key insights from the paper (optional)"
      placeholder: "e.g., Key insight: flow matching outperforms diffusion for action generation..."
    validations:
      required: false
